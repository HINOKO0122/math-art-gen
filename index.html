<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mathlog Art Maker Pro</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
        header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        main { display: flex; flex: 1; overflow: hidden; }
        
        /* パレット */
        #palette { width: 260px; background: #fff; border-right: 1px solid #dee2e6; padding: 15px; overflow-y: auto; }
        .symbol-item { 
            display: inline-block; width: 45px; height: 45px; line-height: 45px; 
            text-align: center; border: 1px solid #eee; margin: 4px; cursor: pointer; 
            font-size: 20px; background: #fff; border-radius: 4px; transition: 0.2s;
        }
        .symbol-item:hover { border-color: #3498db; background: #eaf4fb; transform: translateY(-2px); }

        /* キャンバス */
        #canvas-outer { flex: 1; position: relative; overflow: auto; background: #ddd; }
        #canvas { 
            width: 1000px; height: 1000px; background: white; position: relative; 
            margin: 40px; box-shadow: 0 0 15px rgba(0,0,0,0.1);
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px); background-size: 20px 20px;
        }
        
        /* 配置記号 */
        .placed-symbol { position: absolute; cursor: move; user-select: none; font-size: 24px; white-space: nowrap; padding: 5px; line-height: 1; }
        .placed-symbol:hover { outline: 2px dashed #3498db; background: rgba(52, 152, 219, 0.1); }
        .delete-btn { position: absolute; top: -12px; right: -12px; background: #e74c3c; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; display: none; }
        .placed-symbol:hover .delete-btn { display: block; }

        /* モーダル */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; z-index:999; }
        #output-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 70%; background: white; display: none; padding: 25px; flex-direction: column; z-index: 1000; border-radius: 8px; }
        textarea { flex: 1; font-family: 'Consolas', monospace; margin: 15px 0; padding: 10px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<header>
    <strong>LaTeX Math Art Maker</strong>
    <div>
        <button class="btn-primary" onclick="showOutput()">Mathlog用コードを出力</button>
        <button class="btn-danger" onclick="clearCanvas()">クリア</button>
    </div>
</header>

<main>
    <div id="palette">
        <p style="font-size: 12px; color: #666;">記号を選んでキャンバスへ</p>
        <div id="symbol-list"></div>
    </div>
    
    <div id="canvas-outer">
        <div id="canvas"></div>
    </div>
</main>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="output-modal">
    <h3>Mathlog 貼り付け用コード</h3>
    <textarea id="output-text" readonly></textarea>
    <div style="text-align: right;">
        <button class="btn-primary" onclick="copyToClipboard()">コピーして閉じる</button>
    </div>
</div>

<script>
    const symbols = [
        '\\infty', '\\sum', '\\int', '\\heartsuit', '\\Omega', '\\Delta', '\\nabla', 
        '\\cup', '\\cap', '\\times', '\\otimes', '\\alpha', '\\beta', '\\gamma',
        '\\blacksquare', '\\bigcirc', '\\star', '\\dagger', '\\forall', '\\exists',
        '\\partial', '\\theta', '\\lambda', '\\omega', '\\text{A}', '\\text{B}'
    ];

    const canvas = document.getElementById('canvas');
    const symbolList = document.getElementById('symbol-list');

    // パレット作成
    symbols.forEach(s => {
        const div = document.createElement('div');
        div.className = 'symbol-item';
        div.innerHTML = `\\(${s}\\)`;
        div.onclick = () => addSymbol(s, 50, 50);
        symbolList.appendChild(div);
    });

    function addSymbol(tex, x, y) {
        const div = document.createElement('div');
        div.className = 'placed-symbol';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.innerHTML = `<span>\\(${tex}\\)</span><span class="delete-btn">×</span>`;
        div.setAttribute('data-tex', tex);

        div.onmousedown = function(e) {
            if(e.target.className === 'delete-btn') { div.remove(); return; }
            
            // キャンバス内の相対座標を正しく取得
            const rect = canvas.getBoundingClientRect();
            let shiftX = e.clientX - div.getBoundingClientRect().left;
            let shiftY = e.clientY - div.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                let newX = pageX - rect.left - window.scrollX - shiftX;
                let newY = pageY - rect.top - window.scrollY - shiftY;
                div.style.left = newX + 'px';
                div.style.top = newY + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            
            document.onmouseup = function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };

        canvas.appendChild(div);
        if(window.MathJax) MathJax.typesetPromise([div]);
    }

    function showOutput() {
        const items = document.querySelectorAll('.placed-symbol');
        if(items.length === 0) return alert("記号を配置してください");

        let minX = Infinity, minY = Infinity;
        items.forEach(el => {
            minX = Math.min(minX, parseInt(el.style.left));
            minY = Math.min(minY, parseInt(el.style.top));
        });

        // Mathlog(KaTeX)で最も安定する makebox 重ね書き方式
        let code = "$$\n\\Large\n";
        items.forEach(el => {
            const x = Math.round(parseInt(el.style.left) - minX);
            const y = Math.round(parseInt(el.style.top) - minY);
            const tex = el.getAttribute('data-tex');
            // KaTeXのエラー回避のため、各コマンドを慎重に連結
            code += `\\makebox[0pt][l]{\\hspace{${x}px}\\raisebox{-${y}px}{${tex}}}\n`;
        });
        
        // 表示領域を確保するための支柱
        let maxY = 0;
        items.forEach(el => maxY = Math.max(maxY, parseInt(el.style.top) - minY));
        code += `\\phantom{\\rule{0pt}{${maxY + 30}px}}\n`;
        code += "$$";

        document.getElementById('output-text').value = code;
        document.getElementById('output-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    }

    function copyToClipboard() {
        const textArea = document.getElementById('output-text');
        textArea.select();
        document.execCommand('copy');
        closeModal();
        alert("コピーしました！Mathlogに貼り付けてください。");
    }

    function closeModal() {
        document.getElementById('output-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function clearCanvas() { if(confirm("キャンバスを空にしますか？")) canvas.innerHTML = ''; }
</script>

<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mathlog Art Maker - Final</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f0f0; }
        header { background: #333; color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
        main { display: flex; flex: 1; overflow: hidden; }
        #palette { width: 250px; background: white; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; }
        .symbol-item { 
            display: inline-block; width: 40px; height: 40px; line-height: 40px; 
            text-align: center; border: 1px solid #ddd; margin: 2px; cursor: pointer; font-size: 18px;
        }
        #canvas-container { flex: 1; position: relative; overflow: auto; padding: 50px; }
        #canvas { 
            width: 800px; height: 600px; background: white; position: relative; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            background-image: radial-gradient(#eee 1px, transparent 1px); background-size: 20px 20px;
        }
        .placed-symbol { position: absolute; cursor: move; user-select: none; line-height: 1; padding: 5px; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; text-align: center; cursor: pointer; display: none; }
        .placed-symbol:hover { outline: 1px solid #007bff; }
        .placed-symbol:hover .delete-btn { display: block; }
        #output-modal { position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: white; display: none; flex-direction: column; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; }
        textarea { flex: 1; font-family: monospace; margin: 10px 0; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; }
    </style>
</head>
<body>

<header>
    <strong>Mathlog Art Maker</strong>
    <div>
        <button onclick="generate()">Mathlog用コード出力</button>
        <button onclick="canvas.innerHTML=''">クリア</button>
    </div>
</header>

<main>
    <div id="palette">
        <div id="symbol-list"></div>
    </div>
    <div id="canvas-container">
        <div id="canvas"></div>
    </div>
</main>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="output-modal">
    <h3>コピーしてMathlogの本文（$$の間）に貼り付け</h3>
    <textarea id="output-text"></textarea>
    <button onclick="closeModal()">閉じる</button>
</div>

<script>
    const symbols = ['\\infty', '\\sum', '\\int', '\\heartsuit', '\\Omega', '\\Delta', '\\nabla', '\\alpha', '\\beta', '\\cup', '\\cap', '\\blacksquare', '\\bigcirc', '\\forall'];
    const canvas = document.getElementById('canvas');

    symbols.forEach(s => {
        const div = document.createElement('div');
        div.className = 'symbol-item';
        div.innerHTML = `\\(${s}\\)`;
        div.onclick = () => addSymbol(s);
        document.getElementById('symbol-list').appendChild(div);
    });

    function addSymbol(tex) {
        const div = document.createElement('div');
        div.className = 'placed-symbol';
        div.style.left = '50px';
        div.style.top = '50px';
        div.innerHTML = `<span>\\(${tex}\\)</span><span class="delete-btn">×</span>`;
        div.setAttribute('data-tex', tex);

        div.onmousedown = function(e) {
            if(e.target.className === 'delete-btn') { div.remove(); return; }
            
            // ズレ修正：要素の左上からのオフセットを保持
            const rect = div.getBoundingClientRect();
            const shiftX = e.clientX - rect.left;
            const shiftY = e.clientY - rect.top;

            function moveAt(pageX, pageY) {
                const canvasRect = canvas.getBoundingClientRect();
                // キャンバス内の相対座標を計算
                let x = pageX - canvasRect.left - window.scrollX - shiftX;
                let y = pageY - canvasRect.top - window.scrollY - shiftY;
                div.style.left = x + 'px';
                div.style.top = y + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };
        canvas.appendChild(div);
        if(window.MathJax) MathJax.typesetPromise([div]);
    }

    function generate() {
        const items = document.querySelectorAll('.placed-symbol');
        if(items.length === 0) return;

        let minX = Infinity, minY = Infinity, maxY = 0;
        items.forEach(el => {
            const x = parseInt(el.style.left);
            const y = parseInt(el.style.top);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxY = Math.max(maxY, y);
        });

        // Mathlog(KaTeX)の数式モードでエラーにならない形式
        let code = "$$\n";
        items.forEach(el => {
            const x = parseInt(el.style.left) - minX;
            const y = parseInt(el.style.top) - minY;
            const tex = el.getAttribute('data-tex');
            // \text{} で包むことで \makebox を有効化
            code += `\\text{\\makebox[0pt][l]{\\hspace{${x}px}\\raisebox{-${y}px}{$${tex}$}}}\n`;
        });
        
        // 下に続くテキストとの被り防止
        const height = maxY - minY + 40;
        code += `\\phantom{\\rule{0pt}{${height}px}}\n`;
        code += "$$";

        document.getElementById('output-text').value = code;
        document.getElementById('output-modal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('output-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
